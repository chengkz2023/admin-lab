# -----------------------------------------------------------------------------
# BoyKing Admin Configuration
# 1. Basic runtime
# 2. Security
# 3. Data storage
# 4. File storage
# -----------------------------------------------------------------------------

system:
  router-prefix: ""
  addr: 8888
  iplimit-count: 15000
  iplimit-time: 3600
  use-strict-auth: false
  disable-auto-migrate: false

zap:
  level: info
  prefix: "[boyking-admin/server]"
  format: console
  director: log
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  show-line: true
  log-in-console: true
  retention-day: -1

cors:
  mode: allow-all
  whitelist: []

jwt:
  signing-key: "change-this-jwt-secret"
  expires-time: 7d
  buffer-time: 1d
  issuer: boyking-admin

captcha:
  key-long: 6
  img-width: 240
  img-height: 80
  open-captcha: 0
  open-captcha-timeout: 3600

mysql:
  path: 127.0.0.1
  port: "3306"
  config: charset=utf8mb4&parseTime=True&loc=Local
  db-name: boyking_admin
  username: root
  password: "change-this-mysql-password"
  prefix: ""
  engine: ""
  log-mode: error
  max-idle-conns: 10
  max-open-conns: 100
  singular: false
  log-zap: false

redis:
  enable: false
  name: default
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  useCluster: false
  clusterAddrs: []

local:
  path: uploads/file
  store-path: uploads/file

